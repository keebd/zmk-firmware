name: "Yampad Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/yampad.yml
    - yampad/**

jobs:
  yampad-build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: yampad/yampad.yaml
      config_path: yampad
      archive_name: yampad-firmware

  yampad-release:
    needs: yampad-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: firmware
        merge-multiple: true
    - name: Publish firmware as a rolling release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: yampad-firmware
        name: Yampad Firmware (latest)
        body: |
          Latest Yampad ZMK firmware, built automatically from `main`.
          Wireless (BLE) variants for nice!nano and Mikoto.
        files: firmware/*.uf2
    