name: "Sofle Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/sofle.yml
    - sofle/**

jobs:
  sofle-build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: sofle/sofle.yaml
      config_path: sofle
      archive_name: sofle-firmware

  sofle-release:
    needs: sofle-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: firmware
        merge-multiple: true
    - name: Publish firmware as a rolling release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: sofle-firmware
        name: Sofle Firmware (latest)
        body: |
          Latest Sofle ZMK firmware, built automatically from `main`.
          Includes Wireless (BLE) and Wired (UART) variants for nice!nano and Mikoto.
        files: firmware/*.uf2
    